<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>여행 데이터 가져오기</title>
<style>
body { font-family: -apple-system, sans-serif; background: #1c1c1e; color: #f5f5f7; padding: 24px; max-width: 480px; margin: 0 auto; }
h2 { font-size: 20px; margin-bottom: 8px; }
p { font-size: 14px; color: #8e8e93; margin: 0 0 16px; line-height: 1.5; }
input, textarea { width: 100%; box-sizing: border-box; padding: 12px; border-radius: 10px; border: 1px solid #3a3a3c; background: #2c2c2e; color: #f5f5f7; font-size: 16px; margin-bottom: 12px; }
input { letter-spacing: 4px; }
textarea { height: 160px; font-family: ui-monospace, monospace; font-size: 12px; letter-spacing: 0; line-height: 1.4; resize: vertical; }
button { width: 100%; padding: 14px; border-radius: 10px; border: none; background: #0a84ff; color: #fff; font-size: 17px; font-weight: 600; cursor: pointer; }
button:disabled { opacity: .5; cursor: default; }
#log { margin-top: 20px; font-size: 13px; color: #8e8e93; white-space: pre-wrap; line-height: 1.6; }
.ok { color: #30d158; }
.err { color: #ff453a; }
</style>
</head>
<body>
<h2>✈️ 여행 데이터 가져오기</h2>
<p>아래 칸에 데이터(JSON)를 붙여넣고, PIN 입력 후 가져오기를 누르세요.<br>같은 여행명이 이미 있으면 중복 방지를 위해 중단됩니다.</p>
<input id="pin" type="password" placeholder="PIN" inputmode="numeric" maxlength="6">
<textarea id="data" placeholder="여기에 JSON 붙여넣기"></textarea>
<button id="btn" onclick="run()">Firestore에 가져오기</button>
<div id="log"></div>

<script type="module">
import { initializeApp }        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD_yoo89cFXvXVY0PbpXk6_0I6LRRj5L20",
  authDomain: "trip-hj.firebaseapp.com",
  projectId: "trip-hj",
  storageBucket: "trip-hj.firebasestorage.app",
  messagingSenderId: "776437046785",
  appId: "1:776437046785:web:90416e5fdbee45a1702a00"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const log = document.getElementById('log');
function addLog(msg, cls) {
  const span = document.createElement('span');
  span.className = cls || '';
  span.textContent = msg + '\n';
  log.appendChild(span);
  log.scrollTop = log.scrollHeight;
}

window.run = async function() {
  const pin = document.getElementById('pin').value.trim();
  if (!pin) { alert('PIN을 입력하세요'); return; }

  let data;
  try {
    data = JSON.parse(document.getElementById('data').value);
  } catch (e) {
    alert('JSON 형식이 올바르지 않습니다: ' + e.message); return;
  }
  const TRIP = data.trip, EXCHANGES = data.exchanges || [], EXPENSES = data.expenses || [];
  if (!TRIP || !TRIP.title) { alert('trip.title 이 없습니다'); return; }

  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = '처리 중...';
  log.textContent = '';

  try {
    let user;
    for (const acct of ['hj@ledger.com', 'jeong@ledger.com']) {
      try {
        const cred = await signInWithEmailAndPassword(auth, acct, pin + '00');
        user = cred.user;
        addLog(`✓ 로그인: ${acct}`, 'ok');
        break;
      } catch(e) { /* try next */ }
    }
    if (!user) throw new Error('PIN이 맞지 않습니다');

    const existing = await getDocs(query(collection(db, 'trips'), where('title', '==', TRIP.title)));
    if (!existing.empty) {
      throw new Error(`이미 "${TRIP.title}" 여행이 존재합니다. 중복 실행을 막기 위해 중단합니다.`);
    }

    addLog('\n여행 생성 중...');
    const tripRef = await addDoc(collection(db, 'trips'), { ...TRIP, createdAt: serverTimestamp() });
    const tripId = tripRef.id;
    addLog(`✓ trips/${tripId}  "${TRIP.title}"`, 'ok');

    addLog(`\n환전 ${EXCHANGES.length}건 저장 중...`);
    for (let i = 0; i < EXCHANGES.length; i++) {
      const ex = EXCHANGES[i];
      await addDoc(collection(db, 'trip_exchanges'), {
        tripId, payer: '희정', createdAt: serverTimestamp(), ...ex
      });
      addLog(`  [${i+1}/${EXCHANGES.length}] ${ex.date}  ${ex.currency} ${ex.amountLocal} / ${ex.amountKRW.toLocaleString()}원`, 'ok');
    }

    addLog(`\n지출 ${EXPENSES.length}건 저장 중...`);
    for (let i = 0; i < EXPENSES.length; i++) {
      const exp = EXPENSES[i];
      await addDoc(collection(db, 'trip_expenses'), {
        tripId, payer: '희정', createdAt: serverTimestamp(), ...exp
      });
      addLog(`  [${i+1}/${EXPENSES.length}] ${exp.date}  ${exp.currency}  ${exp.category}  ${exp.detail}`, 'ok');
    }

    addLog(`\n✅ 완료! 여행 1 + 환전 ${EXCHANGES.length} + 지출 ${EXPENSES.length}건 저장됨.`, 'ok');
    addLog('앱에서 확인 후, 안전을 위해 이 import.html 파일을 저장소에서 삭제하세요.', '');
  } catch (e) {
    addLog('\n❌ 오류: ' + e.message, 'err');
    btn.disabled = false;
    btn.textContent = '다시 시도';
  }
};
</script>
</body>
</html>
